{% extends 'core/base.html' %}
{% load static %}

{% block content %}

<section class="home-slider owl-carousel">
  <div class="slider-item" style="background-image: url({% static 'images/bg_1.jpg' %})" data-stellar-background-ratio="0.5">
    <div class="overlay"></div>
    <div class="container">
      <div class="row slider-text justify-content-center align-items-center">
        <div class="col-md-7 col-sm-12 text-center ftco-animate">
          <h1 class="mb-3 mt-5 bread">My Profile</h1>
          <p class="breadcrumbs">
            <span class="mr-2"><a href="{% url 'index' %}">Home</a></span>
            <span>My Profile</span>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="ftco-section">
  <div class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form action="{% url 'user_profile' %}" method="post" class="billing-form ftco-bg-dark p-3 p-md-5">
          {% csrf_token %}
          <h3 class="mb-4 billing-heading">Profile Details</h3>
          <div class="row align-items-end">
            <div class="col-md-12">
              <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" class="form-control" name="first_name" id="first_name" value="{{ user.first_name }}" required>
              </div>
            </div>
            <div class="col-md-12">
              <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" class="form-control" name="last_name" id="last_name" value="{{ user.last_name }}" required>
              </div>
            </div>
            <div class="col-md-12">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" name="email" id="email" value="{{ user.email }}" required>
              </div>
            </div>
            <div class="col-md-12">
              <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" value="{{ user.username }}" disabled>
              </div>
            </div>
            <div class="col-md-12">
              <div class="form-group mt-4">
                <button type="submit" class="btn btn-primary py-3 px-4">Update Profile</button>
              </div>
            </div>
          </div>
        </form>
        <div class="text-center mt-3">
          <a href="{% url 'your_orders' %}" class="btn btn-outline-primary">View My Orders</a>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
